<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Dropdown Navigation</title>

    <link rel="stylesheet"
        href="style.css">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar">

        <!-- Logo -->

        <div class="logo">

            NovaUI

        </div>

        <!-- Menu -->

        <ul class="nav-links">

            <li>
                <a href="#">
                    Home
                </a>
            </li>

            <li class="dropdown">

                <a href="#">

                    Services

                    <i class="fa-solid fa-chevron-down"></i>

                </a>

                <!-- Dropdown -->

                <ul class="dropdown-menu">

                    <li>
                        <a href="#">
                            Web Design
                        </a>
                    </li>

                    <li>
                        <a href="#">
                            App Development
                        </a>
                    </li>

                    <li>
                        <a href="#">
                            UI/UX Design
                        </a>
                    </li>

                </ul>

            </li>

            <li>
                <a href="#">
                    About
                </a>
            </li>

            <li>
                <a href="#">
                    Contact
                </a>
            </li>

        </ul>

        <!-- Mobile Menu Button -->

        <button id="menuBtn">

            <i class="fa-solid fa-bars"></i>

        </button>

    </nav>

    <!-- Hero -->

    <section class="hero">

        <h1>
            Creative Dropdown Navigation
        </h1>

        <p>
            Modern responsive navbar using HTML, CSS & JavaScript.
        </p>

    </section>

    <script src="script.js"></script>

</body>

</html>
